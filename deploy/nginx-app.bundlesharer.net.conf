# Nginx server block for app.bundlesharer.net
# Proxy to the Webhook Forwarder Node app (e.g. PM2 on port 3004).
#
# Install: sudo cp deploy/nginx-app.bundlesharer.net.conf /etc/nginx/sites-available/
# Enable:  sudo ln -sf /etc/nginx/sites-available/nginx-app.bundlesharer.net.conf /etc/nginx/sites-enabled/
# Test:    sudo nginx -t && sudo systemctl reload nginx
#
# Then get SSL: sudo certbot --nginx -d app.bundlesharer.net

server {
    listen 80;
    listen [::]:80;
    server_name app.bundlesharer.net;

    location / {
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
