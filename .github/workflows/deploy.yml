# Trigger VPS deploy on push to main.
# Add repo secret: DEPLOY_WEBHOOK_SECRET = same value as DEPLOY_WEBHOOK_SECRET in VPS .env
# Update the URL below if your app is on a different domain.
name: Deploy to VPS
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy on VPS
        run: |
          curl -sS -X POST "https://app.bundlesharer.net/deploy-webhook" \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}"
